<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
     <header>
        <div class="head-container">
            <h1>Keebs</h1>
            <img src="images/pngegg.png" alt="duckey">
        </div>

        <nav class="nav-container">
            <a href="index.html"'>Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section>
        <div class="form-container">

            <div class="form-box">
                <label for="name">Your Name: </label>
                    <input
                    type="name"
                    id="name"
                    name="name"
                    autocomplete="name"
                />
            </div>

            <div class="form-box">
                <label for="email">Your Email: </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="email"
                />
            </div>

            <div class="form-box">
                <label for="message">Your Message: </label>
                <textarea
                    rows="3"
                ></textarea>
            </div>

            <div class="form-actions">
                    <button type="submit">Submit</button>
            </div>
        </div>

    <footer>
        <div class="footer-container">
            <p>Created by Devon Huynh <br>
            Follow us on <a href="https://fantasy.espn.com/hockey/league/standings?leagueId=1922441543">Socials</a></p>
        </div>
    </footer>
</body>
</html>
